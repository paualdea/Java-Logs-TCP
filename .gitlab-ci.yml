image: maven:3.9.6-eclipse-temurin-21

variables:
  BASE_NAME: "Java-Logs-TCP"
  PACKAGE_NAME: "${BASE_NAME}-${CI_COMMIT_REF_NAME}.jar"
  PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ejecutables/${CI_COMMIT_REF_NAME}/${PACKAGE_NAME}"
  # Definimos la clase principal exactamente como está en tu paquete
  MAIN_CLASS: "ut3.act3.Main"

stages:
  - build
  - upload
  - release
  - sync_external

job_compilacion:
  stage: build
  script:
    - |
      echo "Iniciando compilación del proyecto..."
      mvn clean compile
      echo "Generando manifiesto para el JAR ejecutable..."
      echo "Main-Class: ${MAIN_CLASS}" > manifest.txt
      echo "Empaquetando clases compiladas en ${PACKAGE_NAME}..."
      # Usamos -C para entrar en la carpeta de clases y empaquetar desde la raíz del paquete
      jar cvfm $PACKAGE_NAME manifest.txt -C target/classes .
      echo "Compilación exitosa."
  artifacts:
    paths:
      - $PACKAGE_NAME
    expire_in: 1 week

job_upload:
  stage: upload
  image: curlimages/curl:latest
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file ${PACKAGE_NAME} \
           "${PACKAGE_URL}"
  rules:
    - if: $CI_COMMIT_TAG

job_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --description "Ejecutable versionado: $PACKAGE_NAME" \
        --assets-link "{\"name\":\"${PACKAGE_NAME}\",\"url\":\"${PACKAGE_URL}\"}"
  rules:
    - if: $CI_COMMIT_TAG

sync_to_github:
  stage: sync_external
  image: alpine:latest
  dependencies:
    - job_compilacion
  before_script:
    - apk add --no-cache git curl jq
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"
  script:
    - |
      # Sincronización del repositorio
      curl -H "Authorization: token $GH_TOKEN" \
           -d "{\"name\": \"$CI_PROJECT_NAME\", \"private\": false}" \
           https://api.github.com/user/repos || true
      
      git remote remove github || true
      git remote add github https://${GH_USER}:${GH_TOKEN}@github.com/${GH_USER}/${CI_PROJECT_NAME}.git
      git push github HEAD:refs/heads/master --force || true
      git push github --tags --force

      # Creación de Release en GitHub y subida del asset si existe un TAG
      if [ -n "$CI_COMMIT_TAG" ]; then
        RELEASE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
          -d "{\"tag_name\": \"$CI_COMMIT_TAG\", \"name\": \"$CI_COMMIT_TAG\", \"body\": \"Release generada por GitLab CI\"}" \
          "https://api.github.com/repos/${GH_USER}/${CI_PROJECT_NAME}/releases")
      
        RELEASE_ID=$(echo $RELEASE_JSON | jq '.id')
      
        if [ "$RELEASE_ID" != "null" ]; then
          curl -H "Authorization: token $GH_TOKEN" \
               -H "Content-Type: application/java-archive" \
               --data-binary "@${PACKAGE_NAME}" \
               "https://uploads.github.com/repos/${GH_USER}/${CI_PROJECT_NAME}/releases/${RELEASE_ID}/assets?name=${PACKAGE_NAME}"
        fi
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG